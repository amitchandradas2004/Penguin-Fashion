<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Daisy UI & Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <!-- Googlo font 2 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Penguin Fashion</title>
    <link
      rel="shortcut icon"
      href="assets/icons/favicon.png"
      type="image/x-icon"
    />
    <style>
      .bebas {
        font-family: "Bebas Neue", sans-serif;
        font-style: normal;
      }
      .roboto {
        font-family: "Roboto", sans-serif;
        font-optical-sizing: auto;
        font-variation-settings: "wdth" 100;
      }
    </style>
  </head>
  <body>
    <header class="bg-[#FFFBF0] pb-10">
      <nav class="bg-base-300 py-2 border-b-2 border-gray-200 px-2 md:px-0">
        <div class="container mx-auto flex justify-between items-center">
          <div class="flex items-center">
            <img src="./assets/icons/Frame.png" alt="" />
            <h2 class="text-2xl bebas">
              <span class="text-[#A4BC46]">Penguin</span> Fashion
            </h2>
          </div>
          <div class="items-center">
            <div class="flex gap-5 roboto font-semibold hidden md:inline-flex">
              <h4>Home</h4>
              <h4>Product</h4>
              <h4>About us</h4>
              <h4>Contact us</h4>
            </div>
            <!-- Sidebar -->
            <div class="inline-block md:hidden">
              <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
              <div class="drawer-content flex flex-col">
                <!-- Navbar -->
                <div class=" ">
                  <div class="flex-none">
                    <label
                      for="my-drawer-2"
                      aria-label="open sidebar"
                      class="btn btn-square btn-ghost"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        class="inline-block h-6 w-6 stroke-current"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"
                        ></path>
                      </svg>
                    </label>
                  </div>
                </div>
              </div>
              <div class="drawer-side">
                <label
                  for="my-drawer-2"
                  aria-label="close sidebar"
                  class="drawer-overlay"
                ></label>
                <ul
                  class="menu bg-base-200 min-h-100 w-50 p-5 gap-2 rounded-r-2xl mt-5"
                >
                  <!-- Sidebar content here -->
                  <li class="btn rounded-full btn-neutral">Home</li>
                  <li class="btn btn-neutral rounded-full">Product</li>
                  <li class="btn btn-neutral rounded-full">About us</li>
                  <li class="btn btn-neutral rounded-full">Contact us</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </nav>

      <!-- Hero -->
      <section>
        <div
          class="flex flex-col-reverse md:flex-row justify-between gap-5 container mx-auto items-center px-2 md:px-0 pt-10"
        >
          <div>
            <h2 class="bebas text-[80px]">
              <span class="text-[#FABE4C]">Be the Penguins</span><br />of Winter
            </h2>
            <p class="italic roboto pr-10">
              Click the Buy Now button to add this jacket to your cart
              instantly. Review your selected items anytime and proceed to
              checkout when you're ready.
            </p>
            <button class="btn bg-[#A4BC46] text-white mt-5">
              <i
                class="fa-solid fa-cart-shopping fa-beat"
                style="color: rgb(255, 255, 255)"
              ></i>
              BUY NOW
            </button>
          </div>
          <div><img src="./assets/images/model.png" alt="" /></div>
        </div>
      </section>
    </header>
  </body>
</html>
